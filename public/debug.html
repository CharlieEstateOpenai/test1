<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>API Debug Test</title>
</head>
<body>
    <h1>TinyFish API Debug Test</h1>
    <button onclick="testAPI()">Test Search API</button>
    <pre id="output"></pre>

    <script>
        async function testAPI() {
            const output = document.getElementById('output');
            output.textContent = 'Testing...';
            
            try {
                const response = await fetch('/api/search?q=AAPL');
                output.textContent = `Status: ${response.status}\n`;
                output.textContent += `Headers: ${JSON.stringify(Object.fromEntries(response.headers), null, 2)}\n\n`;
                
                const text = await response.text();
                output.textContent += `Text length: ${text.length}\n`;
                output.textContent += `Text preview:\n${text.substring(0, 1000)}\n\n`;
                
                if (text.trim().startsWith('<')) {
                    output.textContent += 'ERROR: Response is HTML, not JSON!\n';
                } else {
                    try {
                        const json = JSON.parse(text);
                        output.textContent += `Parsed JSON:\n${JSON.stringify(json, null, 2)}`;
                    } catch (e) {
                        output.textContent += `JSON Parse Error: ${e.message}\n`;
                        output.textContent += `\nFirst 500 chars:\n${text.substring(0, 500)}`;
                    }
                }
            } catch (error) {
                output.textContent += `Error: ${error.message}\n${error.stack}`;
            }
        }
    </script>
</body>
</html>
