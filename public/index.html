<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nasdaq Stock Analysis</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <span class="logo">📈</span>
                <h1>Nasdaq Stock Analysis</h1>
            </div>
            <div class="nav-links">
                <a href="/" class="nav-link active" onclick="navigateTo('home')">Home</a>
                <a href="/trending.html" class="nav-link" onclick="navigateTo('trending')">Trending</a>
                <a href="/comparison.html" class="nav-link" onclick="navigateTo('comparison')">Compare</a>
                <a href="/heatmap.html" class="nav-link" onclick="navigateTo('heatmap')">Sectors</a>
                <a href="/about.html" class="nav-link" onclick="navigateTo('about')">About</a>
            </div>
        </div>
    </nav>

    <div class="container main-content">
        <!-- Search Section -->
        <div class="search-section">
            <div class="search-box" style="position: relative;">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Enter stock symbol or company name (e.g., AAPL, TSLA, Apple)"
                    class="search-input"
                    autocomplete="off"
                >
                <button id="searchBtn" class="search-btn">
                    <span>🔍</span> Search
                </button>
            </div>
            <div id="searchResults" class="search-results" style="position: absolute; width: 100%; z-index: 1000;"></div>
        </div>

        <!-- Stock Detail Section -->
        <div id="stockDetail" class="stock-detail">
            <!-- Header Card -->
            <div class="header-card">
                <div class="header-content">
                    <div>
                        <div id="stockSymbol" class="stock-symbol">AAPL</div>
                        <div id="stockName" class="company-name">Apple Inc.</div>
                    </div>
                    <div class="price-section">
                        <button id="addToWatchlistBtn" onclick="handleAddToWatchlist()" class="btn-view" style="margin-bottom: 12px; width: 100%;">
                            ⭐ Add to Watchlist
                        </button>
                        <div id="currentPrice" class="current-price">$0.00</div>
                        <div id="priceChange" class="price-change">+$0.00 (+0.00%)</div>
                    </div>
                </div>
            </div>

            <!-- Content Grid -->
            <div class="content-grid">
                <!-- Analyst Ratings -->
                <div class="data-card">
                    <h3>📊 Analyst Ratings</h3>
                    <div id="analystRatings">
                        <div class="no-data">Loading...</div>
                    </div>
                </div>

                <!-- Company Profile -->
                <div class="data-card">
                    <h3>🏢 Company Profile</h3>
                    <div id="companyProfile">
                        <div class="no-data">Loading...</div>
                    </div>
                </div>
            </div>

            <!-- Key Metrics -->
            <div class="data-card" style="margin-bottom: 24px;">
                <h3>📈 Key Metrics</h3>
                <div id="keyMetrics">
                    <div class="no-data">Loading...</div>
                </div>
            </div>

            <!-- Earnings Data -->
            <div class="data-card">
                <h3>💰 Earnings Data</h3>
                <div id="earningsData">
                    <div class="no-data">Loading...</div>
                </div>
            </div>
        </div>

        <!-- Error Section -->
        <div id="errorSection" class="error-section" style="display: none;">
            <div class="error-message">
                <span>⚠️</span>
                <span id="errorMessage">An error occurred</span>
            </div>
            <button onclick="retrySearch()" class="retry-btn">Retry</button>
        </div>

        <!-- Loading Section -->
        <div id="loadingSection" class="loading-section" style="display: none;">
            <div class="loading-spinner"></div>
            <div class="loading-text">Fetching real-time data from Nasdaq...</div>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
