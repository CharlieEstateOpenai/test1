<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TinyFish 完整调试</title>
  <style>
    body {
      font-family: 'Courier New', monospace;
      padding: 20px;
      background: #0a0a0a;
      color: #0f0;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
    }
    h1 {
      color: #0f0;
      border-bottom: 2px solid #0f0;
      padding-bottom: 10px;
    }
    .section {
      background: #1a1a1a;
      padding: 20px;
      margin: 20px 0;
      border-radius: 10px;
      border: 1px solid #333;
    }
    button {
      background: #0f0;
      color: #000;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin: 5px;
      border-radius: 5px;
    }
    button:hover {
      background: #0a0;
    }
    button:disabled {
      background: #555;
      cursor: not-allowed;
    }
    pre {
      background: #000;
      padding: 15px;
      border-radius: 5px;
      overflow-x: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
      border: 1px solid #333;
    }
    .success { color: #0f0; }
    .error { color: #f00; }
    .info { color: #ff0; }
    .warning { color: #ff8c00; }
    iframe {
      width: 100%;
      height: 600px;
      border: 2px solid #0f0;
      border-radius: 10px;
      background: #000;
    }
    .step {
      margin: 20px 0;
      padding: 15px;
      background: #2a2a2a;
      border-left: 4px solid #0f0;
    }
    .step-number {
      display: inline-block;
      background: #0f0;
      color: #000;
      padding: 5px 15px;
      border-radius: 20px;
      font-weight: bold;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔍 TinyFish 完整调试流程</h1>
    
    <div class="section">
      <h2>📋 测试步骤</h2>
      <p>按照以下步骤依次点击，诊断问题所在：</p>
      
      <div class="step">
        <div class="step-number">步骤 1</div>
        <h3>调用 TinyFish API 创建 Run</h3>
        <button onclick="step1_createRun()">🚀 创建 Run</button>
        <pre id="step1-result">等待执行...</pre>
      </div>
      
      <div class="step">
        <div class="step-number">步骤 2</div>
        <h3>获取完整 Run 信息（包含 streamingUrl）</h3>
        <button onclick="step2_getRunDetails()" id="step2-btn" disabled>📡 获取 Run 详情</button>
        <pre id="step2-result">等待步骤 1 完成...</pre>
      </div>
      
      <div class="step">
        <div class="step-number">步骤 3</div>
        <h3>测试 streamingUrl 是否可访问</h3>
        <button onclick="step3_testStreamingUrl()" id="step3-btn" disabled>🌐 测试 URL</button>
        <pre id="step3-result">等待步骤 2 完成...</pre>
      </div>
      
      <div class="step">
        <div class="step-number">步骤 4</div>
        <h3>在 iframe 中显示实时画面</h3>
        <button onclick="step4_showIframe()" id="step4-btn" disabled>🖥️ 显示 iframe</button>
        <div id="iframe-container" style="margin-top: 20px;"></div>
      </div>
    </div>
    
    <div class="section">
      <h2>📊 当前状态</h2>
      <pre id="current-status">Run ID: 未创建
streamingUrl: 未获取
Status: 等待中</pre>
    </div>
    
    <div class="section">
      <h2>🔧 手动测试</h2>
      <p>如果你已经有 run_id，可以直接输入测试：</p>
      <input type="text" id="manual-run-id" placeholder="输入 run_id" style="padding: 10px; width: 400px; background: #000; color: #0f0; border: 1px solid #0f0;">
      <button onclick="manualTest()">🔍 测试</button>
    </div>
  </div>

  <script>
    const API_KEY = 'sk-tinyfish-jrNPRJUhx20YD6Ozc5sRefmtsdC1MPMu';
    let currentRunId = null;
    let currentStreamingUrl = null;

    function updateStatus() {
      const statusEl = document.getElementById('current-status');
      statusEl.textContent = `Run ID: ${currentRunId || '未创建'}
streamingUrl: ${currentStreamingUrl || '未获取'}
Status: ${currentRunId ? (currentStreamingUrl ? '✅ 就绪' : '⏳ 等待 streamingUrl') : '等待中'}`;
    }

    async function step1_createRun() {
      const resultEl = document.getElementById('step1-result');
      resultEl.textContent = '正在调用 TinyFish API...';
      
      try {
        const response = await fetch('https://agent.tinyfish.ai/v1/automation/run', {
          method: 'POST',
          headers: {
            'X-API-Key': API_KEY,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            url: 'https://www.google.com/finance/quote/AAPL:NASDAQ',
            goal: 'Find the current stock price for AAPL'
          })
        });
        
        const data = await response.json();
        resultEl.textContent = `✅ API 调用成功\n\n${JSON.stringify(data, null, 2)}`;
        
        currentRunId = data.run_id;
        updateStatus();
        
        // 启用步骤 2
        document.getElementById('step2-btn').disabled = false;
        document.getElementById('step2-result').textContent = '准备就绪，点击按钮获取 Run 详情';
        
      } catch (error) {
        resultEl.textContent = `❌ 错误：${error.message}\n\n${error.stack}`;
      }
    }

    async function step2_getRunDetails() {
      if (!currentRunId) {
        alert('请先完成步骤 1');
        return;
      }
      
      const resultEl = document.getElementById('step2-result');
      resultEl.textContent = `正在获取 Run 详情...\nGET /v1/runs/${currentRunId}`;
      
      try {
        const response = await fetch(`https://agent.tinyfish.ai/v1/runs/${currentRunId}`, {
          method: 'GET',
          headers: {
            'X-API-Key': API_KEY
          }
        });
        
        const data = await response.json();
        resultEl.textContent = `✅ 获取成功\n\n${JSON.stringify(data, null, 2)}`;
        
        // 检查 streamingUrl
        if (data.streamingUrl) {
          currentStreamingUrl = data.streamingUrl;
          resultEl.textContent += `\n\n✅ 找到 streamingUrl: ${currentStreamingUrl}`;
          
          // 启用步骤 3 和 4
          document.getElementById('step3-btn').disabled = false;
          document.getElementById('step4-btn').disabled = false;
          document.getElementById('step3-result').textContent = '准备就绪，点击按钮测试 URL';
        } else {
          resultEl.textContent += '\n\n⚠️ 未找到 streamingUrl 字段';
          resultEl.textContent += '\n\n尝试检查其他字段...';
          
          // 检查所有可能的字段
          const possibleFields = ['streamingUrl', 'stream_url', 'streamUrl', 'stream', 'url'];
          possibleFields.forEach(field => {
            if (data[field]) {
              resultEl.textContent += `\n✅ 找到字段 ${field}: ${data[field]}`;
              currentStreamingUrl = data[field];
            }
          });
          
          if (currentStreamingUrl) {
            document.getElementById('step3-btn').disabled = false;
            document.getElementById('step4-btn').disabled = false;
          }
        }
        
        updateStatus();
        
      } catch (error) {
        resultEl.textContent = `❌ 错误：${error.message}\n\n${error.stack}`;
      }
    }

    async function step3_testStreamingUrl() {
      if (!currentStreamingUrl) {
        alert('请先完成步骤 2');
        return;
      }
      
      const resultEl = document.getElementById('step3-result');
      resultEl.textContent = `正在测试 URL...\n${currentStreamingUrl}`;
      
      try {
        const response = await fetch(currentStreamingUrl, {
          method: 'GET'
        });
        
        resultEl.textContent = `✅ URL 可访问
HTTP 状态码: ${response.status} ${response.statusText}
Content-Type: ${response.headers.get('content-type')}

URL: ${currentStreamingUrl}`;
        
      } catch (error) {
        resultEl.textContent = `⚠️ 可能遇到 CORS 限制（这是正常的）
错误: ${error.message}

这是预期的行为，因为 streamingUrl 可能需要特定的认证方式。
直接在 iframe 中显示可能更合适。`;
      }
    }

    function step4_showIframe() {
      if (!currentStreamingUrl) {
        alert('请先完成步骤 2');
        return;
      }
      
      const container = document.getElementById('iframe-container');
      container.innerHTML = `
        <h3 style="color: #0f0;">🖥️ TinyFish 实时浏览器画面</h3>
        <p style="color: #888;">URL: ${currentStreamingUrl}</p>
        <iframe 
          src="${currentStreamingUrl}" 
          width="100%" 
          height="600" 
          frameborder="0"
          allowfullscreen
          sandbox="allow-scripts allow-same-origin allow-forms"
        ></iframe>
        <p style="color: #ff8c00; margin-top: 10px;">
          ⚠️ 如果 iframe 显示空白或错误，可能是：<br>
          1. streamingUrl 需要特定的认证方式<br>
          2. CORS 策略限制<br>
          3. Run 尚未开始或已完成
        </p>
      `;
    }

    async function manualTest() {
      const runId = document.getElementById('manual-run-id').value.trim();
      if (!runId) {
        alert('请输入 run_id');
        return;
      }
      
      currentRunId = runId;
      updateStatus();
      
      await step2_getRunDetails();
      
      if (currentStreamingUrl) {
        step4_showIframe();
      }
    }
  </script>
</body>
</html>
