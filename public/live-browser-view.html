<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TinyFish 实时浏览器画面</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #1a1a1a;
      color: #fff;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
    }
    h1 {
      color: #00ff88;
    }
    .controls {
      margin: 20px 0;
      padding: 20px;
      background: #2a2a2a;
      border-radius: 10px;
    }
    button {
      background: #00ff88;
      color: #000;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin: 5px;
      border-radius: 5px;
    }
    button:hover {
      background: #00cc6a;
    }
    button:disabled {
      background: #555;
      cursor: not-allowed;
    }
    input {
      padding: 10px;
      font-size: 16px;
      border: 2px solid #444;
      border-radius: 5px;
      background: #333;
      color: #fff;
      width: 300px;
      margin: 5px;
    }
    .status {
      padding: 15px;
      background: #2a2a2a;
      border-radius: 10px;
      margin: 20px 0;
    }
    .status-running {
      background: #1a4a1a;
      border-left: 4px solid #00ff88;
    }
    .status-completed {
      background: #1a3a4a;
      border-left: 4px solid #00aaff;
    }
    .status-failed {
      background: #4a1a1a;
      border-left: 4px solid #ff4444;
    }
    .iframe-container {
      margin: 20px 0;
      padding: 20px;
      background: #2a2a2a;
      border-radius: 15px;
      border: 3px dashed #00ff88;
    }
    iframe {
      width: 100%;
      height: 800px;
      border: none;
      border-radius: 10px;
      background: #000;
    }
    .log {
      background: #000;
      padding: 15px;
      border-radius: 10px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      max-height: 400px;
      overflow-y: auto;
      margin: 20px 0;
    }
    .log-line {
      margin: 5px 0;
      padding: 5px;
      border-left: 3px solid #00ff88;
      padding-left: 10px;
    }
    .url-display {
      background: #00ff88;
      color: #000;
      padding: 10px 15px;
      border-radius: 5px;
      font-weight: bold;
      margin: 10px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎬 TinyFish 实时浏览器画面</h1>
    
    <div class="controls">
      <h3>步骤 1: 输入 URL 和目标</h3>
      <div>
        <input type="text" id="url" value="https://www.nasdaq.com/" placeholder="输入 URL">
      </div>
      <div>
        <input type="text" id="goal" value="Find the current stock price and company information for Apple (AAPL)" placeholder="输入目标" style="width: 600px;">
      </div>
      <button onclick="startRun()" id="startBtn">🚀 开始运行</button>
      <button onclick="pollStatus()" id="pollBtn" disabled>🔄 刷新画面</button>
      <button onclick="checkStreamingUrl()" id="checkBtn" disabled>📡 检查 streamingUrl</button>
    </div>

    <div class="status" id="statusBox">
      <strong>状态:</strong> 等待开始...
    </div>

    <div class="url-display" id="urlDisplay" style="display:none;">
      📍 当前 URL: <span id="currentUrl">-</span>
    </div>

    <div class="iframe-container">
      <h3>🖥️ 实时浏览器画面</h3>
      <div id="iframe-placeholder" style="padding: 40px; text-align: center; color: #888;">
        点击"开始运行"后，这里将显示 TinyFish 的实时浏览器操作画面
      </div>
      <iframe id="browserFrame" style="display:none;" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
      <p id="streaming-info" style="color: #888; font-size: 14px; margin-top: 10px;"></p>
    </div>

    <div class="log" id="logBox">
      <div class="log-line">等待操作...</div>
    </div>
  </div>

  <script>
    const API_KEY = 'sk-tinyfish-jrNPRJUhx20YD6Ozc5sRefmtsdC1MPMu';
    let currentRunId = null;
    let pollingInterval = null;

    function log(message) {
      const logBox = document.getElementById('logBox');
      const line = document.createElement('div');
      line.className = 'log-line';
      line.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      logBox.appendChild(line);
      logBox.scrollTop = logBox.scrollHeight;
    }

    function updateStatus(status, type = '') {
      const statusBox = document.getElementById('statusBox');
      statusBox.className = 'status';
      if (type) statusBox.classList.add(`status-${type}`);
      statusBox.innerHTML = `<strong>状态:</strong> ${status}`;
    }

    async function startRun() {
      const url = document.getElementById('url').value;
      const goal = document.getElementById('goal').value;
      const startBtn = document.getElementById('startBtn');
      const pollBtn = document.getElementById('pollBtn');
      const checkBtn = document.getElementById('checkBtn');

      if (!url || !goal) {
        alert('请输入 URL 和目标');
        return;
      }

      startBtn.disabled = true;
      startBtn.textContent = '⏳ 运行中...';
      updateStatus('正在调用 TinyFish API...', 'running');
      log(`开始运行 - URL: ${url}`);
      log(`目标：${goal}`);

      try {
        // 调用 TinyFish API
        const response = await fetch('https://agent.tinyfish.ai/v1/automation/run', {
          method: 'POST',
          headers: {
            'X-API-Key': API_KEY,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ url, goal })
        });

        const result = await response.json();
        log(`API 响应 - Status: ${result.status}, Run ID: ${result.run_id}`);
        
        currentRunId = result.run_id;
        updateStatus(`运行中 - Run ID: ${result.run_id}`, 'running');
        
        // 启用其他按钮
        pollBtn.disabled = false;
        checkBtn.disabled = false;

        // 立即获取完整 run 信息
        await fetchFullRunDetails();

        // 开始轮询状态
        pollingInterval = setInterval(async () => {
          await fetchFullRunDetails();
        }, 5000); // 每 5 秒刷新一次

      } catch (error) {
        log(`错误：${error.message}`);
        updateStatus(`错误：${error.message}`, 'failed');
        startBtn.disabled = false;
        startBtn.textContent = '🚀 开始运行';
      }
    }

    async function fetchFullRunDetails() {
      if (!currentRunId) return;

      try {
        log('获取完整 run 信息...');
        const response = await fetch(`https://agent.tinyfish.ai/v1/runs/${currentRunId}`, {
          method: 'GET',
          headers: {
            'X-API-Key': API_KEY
          }
        });

        if (!response.ok) {
          log(`获取 run 详情失败：${response.status}`);
          return;
        }

        const runDetail = await response.json();
        log(`Run 状态：${runDetail.status}`);
        
        if (runDetail.streamingUrl) {
          log(`✅ 找到 streamingUrl`);
          displayIframe(runDetail.streamingUrl);
        } else {
          log('⚠️ 未找到 streamingUrl');
        }

        // 更新状态显示
        const statusBox = document.getElementById('statusBox');
        statusBox.innerHTML = `
          <strong>状态:</strong> ${runDetail.status}<br>
          <strong>Run ID:</strong> ${runDetail.run_id}<br>
          <strong>开始时间:</strong> ${runDetail.started_at || 'N/A'}<br>
          <strong>结束时间:</strong> ${runDetail.finished_at || 'N/A'}<br>
          <strong>Steps:</strong> ${runDetail.num_of_steps || 0}<br>
          ${runDetail.streamingUrl ? `<strong>Streaming URL:</strong> ${runDetail.streamingUrl}` : ''}
        `;

        if (runDetail.status === 'COMPLETED' || runDetail.status === 'FAILED') {
          clearInterval(pollingInterval);
          document.getElementById('startBtn').disabled = false;
          document.getElementById('startBtn').textContent = '🚀 开始运行';
          document.getElementById('pollBtn').disabled = true;
          
          if (runDetail.status === 'COMPLETED') {
            updateStatus('运行完成', 'completed');
            log('✅ 运行完成');
            if (runDetail.result) {
              log(`结果：${JSON.stringify(runDetail.result, null, 2)}`);
            }
          } else {
            updateStatus(`运行失败：${runDetail.error?.message || '未知错误'}`, 'failed');
            log(`❌ 运行失败：${runDetail.error?.message}`);
          }
        }

      } catch (error) {
        log(`获取 run 详情错误：${error.message}`);
      }
    }

    function displayIframe(streamingUrl) {
      const iframe = document.getElementById('browserFrame');
      const placeholder = document.getElementById('iframe-placeholder');
      const streamingInfo = document.getElementById('streaming-info');
      const urlDisplay = document.getElementById('urlDisplay');
      const currentUrl = document.getElementById('currentUrl');

      iframe.src = streamingUrl;
      iframe.style.display = 'block';
      placeholder.style.display = 'none';
      
      streamingInfo.textContent = `Streaming URL: ${streamingUrl} (有效期 24 小时)`;
      
      urlDisplay.style.display = 'block';
      currentUrl.textContent = streamingUrl;

      log(`🖥️ iframe 已加载 streamingUrl`);
    }

    function pollStatus() {
      if (!currentRunId) {
        alert('请先开始运行');
        return;
      }
      fetchFullRunDetails();
      log('手动刷新状态...');
    }

    function checkStreamingUrl() {
      if (!currentRunId) {
        alert('请先开始运行');
        return;
      }
      fetchFullRunDetails();
    }
  </script>
</body>
</html>
