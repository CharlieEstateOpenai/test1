<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TinyFish API 直接测试</title>
  <style>
    body {
      font-family: 'Courier New', monospace;
      padding: 20px;
      background: #000;
      color: #0f0;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    button {
      background: #0f0;
      color: #000;
      border: none;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      margin: 10px 5px;
    }
    button:hover {
      background: #0a0;
    }
    pre {
      background: #111;
      padding: 15px;
      border: 1px solid #333;
      overflow-x: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .success { color: #0f0; }
    .error { color: #f00; }
    .info { color: #ff0; }
    iframe {
      border: 2px solid #0f0;
      margin: 20px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 TinyFish API 直接测试</h1>
    
    <div>
      <button onclick="testAPI()">🚀 调用 API (搜索 AAPL)</button>
      <button onclick="checkStreamingUrl()">📡 检查 streamingUrl</button>
      <button onclick="clearLog()">🗑️ 清空日志</button>
    </div>

    <h2>📡 API 调用状态</h2>
    <pre id="status">等待调用...</pre>

    <h2>📄 完整 API 响应</h2>
    <pre id="response">等待响应...</pre>

    <h2>🎯 streamingUrl 位置检查</h2>
    <pre id="streaming-check">等待检查...</pre>

    <h2>🖥️ iframe 预览</h2>
    <div id="iframe-container"></div>
  </div>

  <script>
    const API_KEY = 'sk-tinyfish-jrNPRJUhx20YD6Ozc5sRefmtsdC1MPMu';
    let lastResponse = null;

    async function testAPI() {
      const statusEl = document.getElementById('status');
      const responseEl = document.getElementById('response');
      const streamingCheckEl = document.getElementById('streaming-check');
      const iframeContainer = document.getElementById('iframe-container');

      statusEl.innerHTML = '<span class="info">正在调用 TinyFish API...</span>';
      responseEl.textContent = '等待响应...';
      streamingCheckEl.textContent = '等待检查...';
      iframeContainer.innerHTML = '';

      try {
        const response = await fetch('https://agent.tinyfish.ai/v1/automation/run', {
          method: 'POST',
          headers: {
            'X-API-Key': API_KEY,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            url: 'https://www.google.com/finance/quote/AAPL:NASDAQ',
            goal: 'Find the current stock price for AAPL'
          })
        });

        statusEl.innerHTML = `<span class="info">HTTP 状态码：${response.status} ${response.statusText}</span>`;
        
        const text = await response.text();
        
        try {
          lastResponse = JSON.parse(text);
          responseEl.textContent = JSON.stringify(lastResponse, null, 2);
          statusEl.innerHTML += '\n<span class="success">✅ JSON 解析成功</span>';
          
          checkStreamingUrl();
        } catch (e) {
          responseEl.textContent = text;
          statusEl.innerHTML += `\n<span class="error">❌ JSON 解析失败：${e.message}</span>`;
          statusEl.innerHTML += '\n<span class="error">可能返回了 HTML 错误页面</span>';
        }
      } catch (error) {
        statusEl.innerHTML = `<span class="error">❌ 网络错误：${error.message}</span>`;
        responseEl.textContent = error.stack;
      }
    }

    function checkStreamingUrl() {
      const streamingCheckEl = document.getElementById('streaming-check');
      const iframeContainer = document.getElementById('iframe-container');

      if (!lastResponse) {
        streamingCheckEl.textContent = '请先调用 API';
        return;
      }

      let found = false;
      let streamingUrl = null;
      let checks = [];

      // 检查所有可能的位置
      if (lastResponse.streamingUrl) {
        checks.push(`✅ result.streamingUrl: ${lastResponse.streamingUrl}`);
        streamingUrl = lastResponse.streamingUrl;
        found = true;
      } else {
        checks.push(`❌ result.streamingUrl: 不存在`);
      }

      if (lastResponse.data?.streamingUrl) {
        checks.push(`✅ result.data.streamingUrl: ${lastResponse.data.streamingUrl}`);
        if (!streamingUrl) streamingUrl = lastResponse.data.streamingUrl;
        found = true;
      } else {
        checks.push(`❌ result.data.streamingUrl: 不存在`);
      }

      if (lastResponse.output?.streamingUrl) {
        checks.push(`✅ result.output.streamingUrl: ${lastResponse.output.streamingUrl}`);
        if (!streamingUrl) streamingUrl = lastResponse.output.streamingUrl;
        found = true;
      } else {
        checks.push(`❌ result.output.streamingUrl: 不存在`);
      }

      if (lastResponse.result?.streamingUrl) {
        checks.push(`✅ result.result.streamingUrl: ${lastResponse.result.streamingUrl}`);
        if (!streamingUrl) streamingUrl = lastResponse.result.streamingUrl;
        found = true;
      } else {
        checks.push(`❌ result.result.streamingUrl: 不存在`);
      }

      // 检查 run_id，用于构造 streamingUrl
      if (lastResponse.run_id) {
        checks.push(`\n📌 run_id: ${lastResponse.run_id}`);
        checks.push(`💡 尝试构造 streamingUrl: https://tf-${lastResponse.run_id}.fra0-tinyfish.unikraft.app/stream/0`);
      }

      checks.push(`\n📊 运行状态：${lastResponse.status || 'N/A'}`);

      streamingCheckEl.innerHTML = checks.join('\n');

      if (found && streamingUrl) {
        streamingCheckEl.innerHTML += `\n\n<span class="success">✅ 找到 streamingUrl！</span>`;
        
        // 显示 iframe
        iframeContainer.innerHTML = `
          <iframe 
            src="${streamingUrl}" 
            width="100%" 
            height="600" 
            frameborder="0"
            allowfullscreen
          ></iframe>
          <p class="info">Streaming URL: ${streamingUrl}</p>
        `;
      } else if (lastResponse.run_id) {
        // 尝试构造的 streamingUrl
        const constructedUrl = `https://tf-${lastResponse.run_id}.fra0-tinyfish.unikraft.app/stream/0`;
        streamingCheckEl.innerHTML += `\n\n<span class="info">🔧 尝试使用构造的 URL...</span>`;
        
        iframeContainer.innerHTML = `
          <iframe 
            src="${constructedUrl}" 
            width="100%" 
            height="600" 
            frameborder="0"
            allowfullscreen
          ></iframe>
          <p class="info">构造的 Streaming URL: ${constructedUrl}</p>
          <p class="info">注意：此 URL 可能无效，因为 run 可能尚未完成或 streamingUrl 格式不同</p>
        `;
      } else {
        streamingCheckEl.innerHTML += `\n\n<span class="error">❌ 未找到 streamingUrl</span>`;
      }
    }

    function clearLog() {
      document.getElementById('status').textContent = '等待调用...';
      document.getElementById('response').textContent = '等待响应...';
      document.getElementById('streaming-check').textContent = '等待检查...';
      document.getElementById('iframe-container').innerHTML = '';
      lastResponse = null;
    }
  </script>
</body>
</html>
