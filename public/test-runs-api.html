<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TinyFish Runs API 测试</title>
  <style>
    body {
      font-family: 'Courier New', monospace;
      padding: 20px;
      background: #000;
      color: #0f0;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    button {
      background: #0f0;
      color: #000;
      border: none;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      margin: 10px 5px;
    }
    button:hover {
      background: #0a0;
    }
    pre {
      background: #111;
      padding: 15px;
      border: 1px solid #333;
      overflow-x: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .success { color: #0f0; }
    .error { color: #f00; }
    .info { color: #ff0; }
    input {
      background: #111;
      color: #0f0;
      border: 1px solid #0f0;
      padding: 8px;
      font-size: 14px;
      width: 400px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔍 TinyFish Runs API 测试</h1>
    
    <div>
      <button onclick="testRunAPI()">📋 获取 Runs 列表</button>
      <button onclick="testSingleRun()">🎯 获取单个 Run 详情</button>
      <button onclick="testStreamAPI()">📺 测试 Stream API</button>
      <button onclick="clearLog()">🗑️ 清空</button>
    </div>

    <div style="margin: 20px 0;">
      <label>Run ID: </label>
      <input type="text" id="runId" placeholder="输入 run_id" value="fb59baeb-4efa-4378-a38b-858da5928069">
    </div>

    <h2>📡 测试 1: GET /v1/automation/runs (获取列表)</h2>
    <pre id="runs-response">等待测试...</pre>

    <h2>📡 测试 2: GET /v1/automation/runs/{run_id} (获取详情)</h2>
    <pre id="single-run-response">等待测试...</pre>

    <h2>📡 测试 3: GET /v1/automation/runs/{run_id}/stream (获取流)</h2>
    <pre id="stream-response">等待测试...</pre>
    <div id="iframe-container"></div>
  </div>

  <script>
    const API_KEY = 'sk-tinyfish-jrNPRJUhx20YD6Ozc5sRefmtsdC1MPMu';

    async function testRunAPI() {
      const responseEl = document.getElementById('runs-response');
      responseEl.textContent = '正在调用 GET /v1/automation/runs...';

      try {
        const response = await fetch('https://agent.tinyfish.ai/v1/automation/runs', {
          method: 'GET',
          headers: {
            'X-API-Key': API_KEY
          }
        });

        const text = await response.text();
        
        try {
          const data = JSON.parse(text);
          responseEl.textContent = JSON.stringify(data, null, 2);
          
          // 检查列表中是否有 streamingUrl
          if (data.runs && data.runs.length > 0) {
            const firstRun = data.runs[0];
            responseEl.textContent += `\n\n📌 第一个 run 的详细信息:\n`;
            responseEl.textContent += `run_id: ${firstRun.run_id}\n`;
            responseEl.textContent += `status: ${firstRun.status}\n`;
            if (firstRun.streamingUrl) {
              responseEl.textContent += `\n✅ 找到 streamingUrl: ${firstRun.streamingUrl}`;
            } else {
              responseEl.textContent += `\n❌ 没有 streamingUrl 字段`;
            }
          }
        } catch (e) {
          responseEl.textContent = `JSON 解析失败：${e.message}\n\n原始响应:\n${text}`;
        }
      } catch (error) {
        responseEl.textContent = `网络错误：${error.message}`;
      }
    }

    async function testSingleRun() {
      const runId = document.getElementById('runId').value;
      const responseEl = document.getElementById('single-run-response');
      
      if (!runId) {
        responseEl.textContent = '❌ 请输入 run_id';
        return;
      }

      responseEl.textContent = `正在调用 GET /v1/automation/runs/${runId}...`;

      try {
        const response = await fetch(`https://agent.tinyfish.ai/v1/automation/runs/${runId}`, {
          method: 'GET',
          headers: {
            'X-API-Key': API_KEY
          }
        });

        const text = await response.text();
        
        try {
          const data = JSON.parse(text);
          responseEl.textContent = JSON.stringify(data, null, 2);
          
          // 检查 streamingUrl
          if (data.streamingUrl) {
            responseEl.textContent += `\n\n✅ 找到 streamingUrl: ${data.streamingUrl}`;
          } else if (data.data?.streamingUrl) {
            responseEl.textContent += `\n\n✅ 找到 streamingUrl (data.streamingUrl): ${data.data.streamingUrl}`;
          } else {
            responseEl.textContent += `\n\n❌ 没有 streamingUrl 字段`;
          }
        } catch (e) {
          responseEl.textContent = `JSON 解析失败：${e.message}\n\n原始响应:\n${text}`;
        }
      } catch (error) {
        responseEl.textContent = `网络错误：${error.message}`;
      }
    }

    async function testStreamAPI() {
      const runId = document.getElementById('runId').value;
      const responseEl = document.getElementById('stream-response');
      const iframeContainer = document.getElementById('iframe-container');
      
      if (!runId) {
        responseEl.textContent = '❌ 请输入 run_id';
        return;
      }

      responseEl.textContent = `正在调用 GET /v1/automation/runs/${runId}/stream...`;
      iframeContainer.innerHTML = '';

      try {
        const response = await fetch(`https://agent.tinyfish.ai/v1/automation/runs/${runId}/stream`, {
          method: 'GET',
          headers: {
            'X-API-Key': API_KEY
          }
        });

        responseEl.textContent = `HTTP 状态码：${response.status} ${response.statusText}\n`;
        responseEl.textContent += `Content-Type: ${response.headers.get('content-type')}\n`;

        const contentType = response.headers.get('content-type');
        
        if (contentType && contentType.includes('text/html')) {
          const html = await response.text();
          responseEl.textContent += `\n返回了 HTML 页面:\n${html.substring(0, 500)}...`;
        } else if (contentType && contentType.includes('application/json')) {
          const data = await response.json();
          responseEl.textContent += `\nJSON 响应:\n${JSON.stringify(data, null, 2)}`;
        } else {
          responseEl.textContent += `\n未知内容类型，可能是视频流或 WebSocket`;
        }

        // 尝试显示 iframe
        const streamUrl = `https://agent.tinyfish.ai/v1/automation/runs/${runId}/stream`;
        responseEl.textContent += `\n\n🔧 尝试在 iframe 中显示 stream URL...`;
        
        iframeContainer.innerHTML = `
          <h3>Stream URL (带 API Key):</h3>
          <iframe 
            src="${streamUrl}" 
            width="100%" 
            height="600" 
            frameborder="0"
            allowfullscreen
          ></iframe>
          <p>URL: ${streamUrl}</p>
          <p>注意：可能需要 API Key 认证，iframe 可能无法直接显示</p>
        `;
      } catch (error) {
        responseEl.textContent = `网络错误：${error.message}`;
      }
    }

    function clearLog() {
      document.getElementById('runs-response').textContent = '等待测试...';
      document.getElementById('single-run-response').textContent = '等待测试...';
      document.getElementById('stream-response').textContent = '等待测试...';
      document.getElementById('iframe-container').innerHTML = '';
    }
  </script>
</body>
</html>
