<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TinyFish API 测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .test-section {
            margin-bottom: 30px;
        }
        
        .test-card {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .test-card h3 {
            color: #667eea;
            margin-bottom: 15px;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .result {
            margin-top: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 6px;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .result pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 12px;
            font-family: 'Courier New', monospace;
        }
        
        .success {
            border-left: 4px solid #2ecc71;
        }
        
        .error {
            border-left: 4px solid #e74c3c;
            background: #fdf2f2;
        }
        
        .loading {
            color: #667eea;
            font-weight: 600;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
        }
        
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔬 TinyFish API 测试工具</h1>
        
        <div class="test-section">
            <h2>1. 股票价格测试 (Yahoo Finance)</h2>
            <div class="input-group">
                <input type="text" id="symbolInput" value="AAPL" placeholder="输入股票代码">
                <button onclick="testPrice()">测试价格 API</button>
            </div>
            <div id="priceResult"></div>
        </div>
        
        <div class="test-section">
            <h2>2. 直接调用 TinyFish API</h2>
            <div class="input-group">
                <input type="text" id="urlInput" value="https://query1.finance.yahoo.com/v8/finance/chart/AAPL?range=1d&interval=1m" placeholder="输入 URL" style="width: 70%;">
                <button onclick="testDirectTinyFish()">直接调用</button>
            </div>
            <div id="directResult"></div>
        </div>
        
        <div class="test-section">
            <h2>3. 后端 API 端点测试</h2>
            <div class="test-card">
                <h3>测试 /api/stock/AAPL/price</h3>
                <button onclick="testBackendPrice()">调用后端 API</button>
                <div id="backendResult"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        
        async function testPrice() {
            const symbol = document.getElementById('symbolInput').value.toUpperCase();
            const resultDiv = document.getElementById('priceResult');
            
            resultDiv.innerHTML = '<div class="result loading">正在调用 TinyFish API...</div>';
            
            try {
                const url = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?range=1d&interval=1m`;
                const goal = `Extract the current stock price from this Yahoo Finance chart data for ${symbol}. Return ONLY JSON: {"symbol":"${symbol}","price":000.00,"change":00.00,"change_percent":0.00}`;
                
                const response = await fetch('https://agent.tinyfish.ai/v1/automation/run', {
                    method: 'POST',
                    headers: {
                        'X-API-Key': 'sk-tinyfish-jrNPRJUhx20YD6Ozc5sRefmtsdC1MPMu',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ url, goal })
                });
                
                const text = await response.text();
                let data;
                try {
                    data = JSON.parse(text);
                } catch (e) {
                    data = { raw: text };
                }
                
                resultDiv.innerHTML = `
                    <div class="result success">
                        <h4>✅ 调用成功 (Status: ${response.status})</h4>
                        <p><strong>耗时:</strong> ${response.headers.get('x-response-time') || 'N/A'}ms</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="result error">
                        <h4>❌ 调用失败</h4>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }
        
        async function testDirectTinyFish() {
            const url = document.getElementById('urlInput').value;
            const resultDiv = document.getElementById('directResult');
            
            resultDiv.innerHTML = '<div class="result loading">正在调用...</div>';
            
            try {
                const goal = 'Extract relevant data from this page and return as JSON';
                
                const response = await fetch('https://agent.tinyfish.ai/v1/automation/run', {
                    method: 'POST',
                    headers: {
                        'X-API-Key': 'sk-tinyfish-jrNPRJUhx20YD6Ozc5sRefmtsdC1MPMu',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ url, goal })
                });
                
                const text = await response.text();
                let data;
                try {
                    data = JSON.parse(text);
                } catch (e) {
                    data = { raw: text, error: 'Invalid JSON' };
                }
                
                resultDiv.innerHTML = `
                    <div class="result success">
                        <h4>✅ 调用成功 (Status: ${response.status})</h4>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="result error">
                        <h4>❌ 调用失败</h4>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }
        
        async function testBackendPrice() {
            const symbol = document.getElementById('symbolInput').value.toUpperCase();
            const resultDiv = document.getElementById('backendResult');
            
            resultDiv.innerHTML = '<div class="result loading">正在调用后端 API...</div>';
            
            try {
                const response = await fetch(`${API_BASE}/api/stock/${symbol}/price`);
                const data = await response.json();
                
                resultDiv.innerHTML = `
                    <div class="result success">
                        <h4>✅ 后端 API 响应 (Status: ${response.status})</h4>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="result error">
                        <h4>❌ 后端 API 调用失败</h4>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
